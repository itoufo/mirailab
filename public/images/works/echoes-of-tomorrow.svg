<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" />
  <rect x="40" y="40" width="720" height="370" rx="16" fill="rgba(255,255,255,0.08)" />
  <circle cx="150" cy="350" r="70" fill="rgba(255,255,255,0.06)" />
  <circle cx="650" cy="130" r="90" fill="rgba(255,255,255,0.05)" />
  <circle cx="400" cy="350" r="50" fill="rgba(255,255,255,0.04)" />
  <text x="400" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">Echoes of Tomorrow</text>
  <text x="400" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">SF Visual Novel</text>
</svg>