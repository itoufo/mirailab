  <text x="400" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">DevKit CLI</text>
  <text x="400" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">Developer Workflow Tools</text>
