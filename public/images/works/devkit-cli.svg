  </defs>
  <rect width="800" height="450" fill="url(#bg)" />
  <rect x="40" y="40" width="720" height="370" rx="16" fill="rgba(255,255,255,0.08)" />
  <circle cx="700" cy="380" r="75" fill="rgba(255,255,255,0.06)" />
  <circle cx="100" cy="120" r="55" fill="rgba(255,255,255,0.05)" />
  <circle cx="350" cy="80" r="35" fill="rgba(255,255,255,0.04)" />
