<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" />
  <rect x="40" y="40" width="720" height="370" rx="16" fill="rgba(255,255,255,0.08)" />
  <circle cx="680" cy="100" r="65" fill="rgba(255,255,255,0.06)" />
  <circle cx="120" cy="330" r="85" fill="rgba(255,255,255,0.05)" />
  <circle cx="500" cy="380" r="45" fill="rgba(255,255,255,0.04)" />
  <text x="400" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">Mirror World</text>
  <text x="400" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle">鏡像世界</text>
</svg>