<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" />
  <rect x="40" y="40" width="720" height="370" rx="16" fill="rgba(255,255,255,0.08)" />
  <circle cx="700" cy="100" r="60" fill="rgba(255,255,255,0.06)" />
  <circle cx="100" cy="380" r="70" fill="rgba(255,255,255,0.05)" />
  <circle cx="550" cy="370" r="35" fill="rgba(255,255,255,0.04)" />
  <text x="400" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">Web小説 ×</text>
  <text x="400" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">テクノロジーの可能性</text>
  <text x="400" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle">Blog</text>
</svg>