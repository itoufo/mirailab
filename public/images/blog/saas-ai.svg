  </defs>
  <rect width="800" height="450" fill="url(#bg)" />
  <rect x="40" y="40" width="720" height="370" rx="16" fill="rgba(255,255,255,0.08)" />
  <circle cx="650" cy="120" r="70" fill="rgba(255,255,255,0.06)" />
  <circle cx="150" cy="350" r="55" fill="rgba(255,255,255,0.05)" />
  <circle cx="500" cy="80" r="30" fill="rgba(255,255,255,0.04)" />
  <text x="400" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">AIを活用した</text>
  <text x="400" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">SaaS開発の舞台裏</text>
  <text x="400" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle">Blog</text>
